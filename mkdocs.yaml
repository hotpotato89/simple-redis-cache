site_name: simple-redis-cache
site_description: Простой декоратор для кэширования в Redis
site_url: https://hotpotato89.github.io/simple-redis-cache/
repo_url: https://github.com/hotpotato89/simple-redis-cache
repo_name: hotpotato89/simple-redis-cache

theme:
  name: material
  logo: redis.svg
  palette:
    - scheme: default
      primary: teal
      accent: light_blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: light_blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hotpotato89
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/simple-redis-cache/

nav:
  - Home: index.md
  - Установка: installation.md
  - Быстрый старт: quickstart.md
  - Использование:
      - Синхронный режим: usage/sync.md
      - Асинхронный режим: usage/async.md
  - Примеры: examples.md
  - Изменения: changelog.md
  - API Reference: api.md